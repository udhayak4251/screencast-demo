<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playwright Telecast Listener</title>
    <style>
      :root {
        --bg: #0f172a;
        --card: #111827;
        --text: #e5e7eb;
        --muted: #94a3b8;
        --ok: #22c55e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top, #1e293b 0%, var(--bg) 55%);
        display: grid;
        place-items: center;
        padding: 20px;
      }

      .panel {
        width: min(1100px, 100%);
        background: color-mix(in srgb, var(--card) 92%, black);
        border: 1px solid #334155;
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.35);
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
      }

      .title {
        margin: 0;
        font-size: 1.1rem;
      }

      .status {
        font-size: 0.9rem;
        color: var(--muted);
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        display: inline-block;
        margin-right: 6px;
        background: #ef4444;
      }

      .dot.live {
        background: var(--ok);
      }

      .frame-wrap {
        width: 100%;
        aspect-ratio: 16 / 9;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid #475569;
        background: #020617;
        display: grid;
        place-items: center;
      }

      #frame {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }

      .hint {
        margin-top: 10px;
        color: var(--muted);
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <section class="panel">
      <div class="header">
        <h1 class="title">Live Playwright Socket Stream</h1>
        <div class="status"><span id="dot" class="dot"></span><span id="state">waiting for frames...</span></div>
      </div>

      <div class="frame-wrap">
        <img id="frame" alt="Live stream frame" />
      </div>
      <p class="hint">Run your Playwright test to emit frames to this listener.</p>
    </section>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      const image = document.getElementById("frame");
      const dot = document.getElementById("dot");
      const state = document.getElementById("state");

      socket.on("connect", () => {
        dot.classList.add("live");
        state.textContent = "connected";
      });

      socket.on("disconnect", () => {
        dot.classList.remove("live");
        state.textContent = "disconnected";
      });

      socket.on("frame", (base64) => {
        image.src = `data:image/jpeg;base64,${base64}`;
        if (!dot.classList.contains("live")) {
          dot.classList.add("live");
        }
        state.textContent = "receiving frames";
      });
    </script>
  </body>
</html>
